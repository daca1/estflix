<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ESTFlix — Perfis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/profiles.css">
</head>
<body>

  <div id="page-profiles">
    <div class="profiles-wrap">

      <div class="profiles-header">
        <h1>ESTFlix</h1>
        <p>Quem está a ver?</p>
      </div>

      <!-- Perfis gerados por JS -->
      <div class="profiles-grid" id="profiles-grid"></div>

      <!-- Formulário de novo perfil (oculto por defeito) -->
      <div id="profile-form-wrap" class="hidden">
        <div class="form-panel">
          <h2>Criar Perfil</h2>
          <div class="form-group">
            <label>Nome do Perfil</label>
            <input type="text" id="new-profile-name"
                   placeholder="Introduz o nome" maxlength="20" />
          </div>
          <div class="form-group">
            <label>Escolhe um Avatar</label>
            <div class="avatar-grid" id="avatar-grid"></div>
          </div>
          <div class="btn-row">
            <button class="btn btn-primary" onclick="submitNewProfile()">Criar</button>
            <button class="btn btn-secondary" onclick="hideProfileForm()">Cancelar</button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="../js/data.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/page-profiles.js"></script>
  <script>
    // Inicializar estado mínimo necessário
    const state = { selectedAvatar: AVATARS[0], showProfileForm: false };

    function navigate(page) {
      // Guardar perfil seleccionado e redirecionar
      window.location.href = 'home.html';
    }

    // Ao submeter, guardar perfil activo em sessionStorage e ir para home
    function submitNewProfile() {
      const name = document.getElementById('new-profile-name').value.trim();
      if (!name) return;
      const p = Profiles.add(name, state.selectedAvatar);
      sessionStorage.setItem('activeProfileId', p.id);
      window.location.href = 'home.html';
    }

    function selectProfile(id) {
      sessionStorage.setItem('activeProfileId', id);
      window.location.href = 'home.html';
    }

    renderProfiles();
  </script>
</body>
</html>
